<!-- 공통 로그인 화면 (chat.html, settings.html에서 공유) -->
<!-- {{loginPrefix}} 는 panelUtils에서 페이지별 접두사로 치환됨 -->
<style>
  .codepilot-login-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    padding: 24px;
    box-sizing: border-box;
  }
  .codepilot-login-screen .login-box {
    width: 100%;
    max-width: 360px;
    text-align: center;
  }
  .codepilot-login-screen h2 {
    margin: 0 0 4px;
    font-size: 16px;
    font-weight: 700;
    color: var(--vscode-foreground);
  }
  .codepilot-login-screen .login-subtitle {
    margin: 0 0 24px;
    font-size: 12px;
    color: var(--vscode-descriptionForeground);
  }
  .codepilot-login-screen .login-btn {
    width: 100%;
    margin-top: 14px;
    padding: 10px 0;
    font-size: 13px;
    font-weight: 600;
    border: none;
    border-radius: 6px;
    background: var(--vscode-button-background);
    color: var(--vscode-button-foreground);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .codepilot-login-screen .login-btn:hover {
    background: var(--vscode-button-hoverBackground);
  }
  .codepilot-login-screen .login-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
  .codepilot-login-screen .login-error {
    display: none;
    margin-top: 8px;
    padding: 8px 10px;
    border-radius: 6px;
    background: rgba(220, 38, 38, 0.1);
    color: var(--vscode-errorForeground, #f44);
    font-size: 12px;
    text-align: left;
  }
  .codepilot-login-screen .login-help {
    margin-top: 20px;
    font-size: 11px;
    color: var(--vscode-descriptionForeground);
    line-height: 1.6;
  }
</style>

<div id="{{loginPrefix}}-login-screen" class="codepilot-login-screen">
  <div class="login-box">
    <h2>CODEPILOT</h2>
    <p class="login-subtitle">{{loginSubtitle}}</p>

    <button id="{{loginPrefix}}-google-login-btn" class="login-btn">
      <svg width="16" height="16" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59a14.5 14.5 0 0 1 0-9.18l-7.98-6.19a24.0 24.0 0 0 0 0 21.56l7.98-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Google로 로그인
    </button>

    <div id="{{loginPrefix}}-login-error" class="login-error"></div>

    <p class="login-help">
      Google 계정으로 로그인하여<br/>
      CODEPILOT의 모든 기능을 사용하세요.
    </p>
  </div>
</div>
