    <!-- Mode dropdown (CODE / ASK / PLAN) -->
    <script>
      (function () {
        const modeBtn = document.getElementById("mode-selector");
        const modeLabel = document.getElementById("mode-label");
        const dropdown = document.getElementById("mode-dropdown");
        if (!modeBtn || !dropdown || !modeLabel) return;

        // 전역 모드 상태
        window.chatMode = window.chatMode || "CODE";

        const applyMode = (mode) => {
          const normalized = mode === "ASK" ? "ASK" : mode === "PLAN" ? "PLAN" : "CODE";
          window.chatMode = normalized;
          modeLabel.textContent = normalized;
          // 모드에 따라 버튼의 data-mode 속성 설정 (색상 포인트용)
          if (modeBtn) {
            modeBtn.setAttribute("data-mode", normalized);
          }
          window.dispatchEvent(new Event("chat-mode-changed"));
        };

        const closeDropdown = () => {
          dropdown.classList.add("hidden");
          dropdown.style.display = "none";
        };

        // 선택된 옵션 업데이트 함수
        const updateSelectedOption = () => {
          dropdown.querySelectorAll(".dropdown-option").forEach((opt) => {
            const optMode = opt.getAttribute("data-mode") || "CODE";
            if (optMode === window.chatMode) {
              opt.classList.add("selected");
            } else {
              opt.classList.remove("selected");
            }
          });
        };

        // 초기 라벨/모드 세팅
        applyMode(window.chatMode);
        updateSelectedOption(); // 초기 로드 시 선택된 옵션 표시
        closeDropdown();

        modeBtn.addEventListener("click", (e) => {
          e.stopPropagation();
          const willShow = dropdown.classList.contains("hidden");
          if (willShow) {
            updateSelectedOption(); // 드롭다운 열 때 선택된 옵션 업데이트
            dropdown.classList.remove("hidden");
            dropdown.style.display = "block";
          } else {
            closeDropdown();
          }
        });

        dropdown.querySelectorAll(".dropdown-option").forEach((opt) => {
          opt.addEventListener("click", () => {
            const mode = opt.getAttribute("data-mode") || "CODE";
            applyMode(mode);
            updateSelectedOption(); // 모드 변경 시 선택된 옵션 업데이트
            closeDropdown();
          });
        });

        document.addEventListener("click", (e) => {
          if (!dropdown.contains(e.target) && e.target !== modeBtn) {
            closeDropdown();
          }
        });
      })();
    </script>

    <!-- Pending Changes Dropdown -->
    <script>
      (function () {
        const pendingBtn = document.getElementById("pending-changes-btn");
        const pendingLabel = document.getElementById("pending-changes-label");
        const dropdown = document.getElementById("pending-changes-dropdown");
        const dropdownContent = document.getElementById(
          "pending-dropdown-content",
        );
        const dropdownTitle = document.getElementById("pending-dropdown-title");
        const acceptAllBtn = document.getElementById("pending-accept-all");
        const rejectAllBtn = document.getElementById("pending-reject-all");

        if (!pendingBtn || !dropdown || !dropdownContent) return;

        let pendingFiles = [];

        const closeDropdown = () => {
          dropdown.classList.add("hidden");
          dropdown.style.display = "none";
        };

        const openDropdown = () => {
          dropdown.classList.remove("hidden");
          dropdown.style.display = "block";
          // 열릴 때 최신 정보 요청
          if (window.vscode) {
            window.vscode.postMessage({ command: "requestPendingChanges" });
          }
        };

        // 채팅 패널에서 해당 파일의 Accept/Reject 버튼 제거
        const removeChatPanelButtons = (filePath) => {
          const fileName =
            filePath.split("/").pop() || filePath.split("\\").pop() || filePath;
          const codeBlocks = document.querySelectorAll(".code-block-container");
          codeBlocks.forEach((block) => {
            const dataFilePath = block.getAttribute("data-file-path");
            const isMatch =
              dataFilePath &&
              (dataFilePath === filePath ||
                dataFilePath.endsWith(fileName) ||
                filePath.endsWith(dataFilePath) ||
                dataFilePath.includes(fileName));
            if (isMatch) {
              let nextElement = block.nextElementSibling;
              while (nextElement) {
                if (nextElement.classList.contains("bash-button-container")) {
                  const keepBtn = nextElement.querySelector(".keep-button");
                  const undoBtn = nextElement.querySelector(".undo-button");
                  if (keepBtn) keepBtn.remove();
                  if (undoBtn) undoBtn.remove();
                  if (nextElement.children.length === 0) {
                    nextElement.remove();
                  }
                  break;
                }
                if (nextElement.classList.contains("code-block-container")) {
                  break;
                }
                nextElement = nextElement.nextElementSibling;
              }
            }
          });
        };

        const renderDropdownContent = () => {
          dropdownContent.innerHTML = "";
          dropdownTitle.textContent = `Pending Changes (${pendingFiles.length} files)`;

          if (pendingFiles.length === 0) {
            dropdownContent.innerHTML =
              '<div style="padding: 12px; text-align: center; color: var(--vscode-descriptionForeground); font-size: 12px;">No pending changes</div>';
            return;
          }

          pendingFiles.forEach((file) => {
            const item = document.createElement("div");
            item.className = "pending-dropdown-item";
            // 상대 경로 추출 (workspace 경로 제거)
            const displayPath =
              file.filePath.replace(
                /^.*?(?=src\/|app\/|lib\/|components\/|pages\/|utils\/|services\/|core\/|webview\/)/i,
                "",
              ) || file.filePath;
            item.innerHTML = `
                        <div class="file-info">
                            <span class="file-path" title="${file.filePath}">${displayPath}</span>
                            <span class="file-stats">
                                <span class="added">+${file.addedLines}</span>
                                <span class="deleted">−${file.deletedLines}</span>
                            </span>
                        </div>
                        <div class="actions">
                            <button class="view-btn" title="View Diff">View</button>
                            <button class="undo-btn" title="Undo">Undo</button>
                            <button class="keep-btn" title="Keep">Keep</button>
                        </div>
                    `;

            item.querySelector(".view-btn").addEventListener("click", (e) => {
              e.stopPropagation();
              if (window.vscode) {
                window.vscode.postMessage({
                  command: "viewPendingDiff",
                  filePath: file.filePath,
                });
              }
            });

            item.querySelector(".keep-btn").addEventListener("click", (e) => {
              e.stopPropagation();
              if (window.vscode) {
                window.vscode.postMessage({
                  command: "acceptPendingFile",
                  filePath: file.filePath,
                });
              }
              removeChatPanelButtons(file.filePath);
            });

            item.querySelector(".undo-btn").addEventListener("click", (e) => {
              e.stopPropagation();
              if (window.vscode) {
                window.vscode.postMessage({
                  command: "rejectPendingFile",
                  filePath: file.filePath,
                });
              }
              removeChatPanelButtons(file.filePath);
            });

            dropdownContent.appendChild(item);
          });
        };

        // 메시지 리스너
        window.addEventListener("message", (event) => {
          const data = event.data;
          if (data.command === "updatePendingChanges") {
            pendingFiles = data.files || [];

            if (pendingFiles.length > 0) {
              pendingBtn.style.display = "inline-flex";
              pendingLabel.textContent = `${pendingFiles.length} File${pendingFiles.length > 1 ? "s" : ""}`;
            } else {
              pendingBtn.style.display = "none";
              closeDropdown();
            }

            renderDropdownContent();
          }

          // 턴 레벨 pending changes 업데이트
          if (data.command === "updatePendingChangesByTurn") {
            window._latestTurnStats = data.turns || [];
            const activeTurnIds = new Set((data.turns || []).map(t => t.conversationTurnId));

            // 기존 턴 액션 숨기기/표시 + 라벨 업데이트 (DOM 생성은 showTurnActions에서만)
            document.querySelectorAll(".turn-actions[data-turn-id]").forEach(div => {
              const turnId = div.getAttribute("data-turn-id");
              if (!activeTurnIds.has(turnId)) {
                div.remove(); // 완료된 턴은 DOM에서 제거
              } else {
                div.style.display = "block";
                const turnData = (data.turns || []).find(t => t.conversationTurnId === turnId);
                if (turnData) window._updateTurnActionContent(div, turnData);
              }
            });
          }
        });

        // 버튼 클릭
        pendingBtn.addEventListener("click", (e) => {
          e.stopPropagation();
          const willShow = dropdown.classList.contains("hidden");
          if (willShow) {
            openDropdown();
          } else {
            closeDropdown();
          }
        });

        // Accept All
        acceptAllBtn.addEventListener("click", (e) => {
          e.stopPropagation();
          pendingFiles.forEach((file) => removeChatPanelButtons(file.filePath));
          if (window.vscode) {
            window.vscode.postMessage({ command: "acceptAllPendingFiles" });
          }
          closeDropdown();
        });

        // Reject All
        rejectAllBtn.addEventListener("click", (e) => {
          e.stopPropagation();
          pendingFiles.forEach((file) => removeChatPanelButtons(file.filePath));
          if (window.vscode) {
            window.vscode.postMessage({ command: "rejectAllPendingFiles" });
          }
          closeDropdown();
        });

        // 외부 클릭 시 닫기
        document.addEventListener("click", (e) => {
          if (
            !dropdown.contains(e.target) &&
            e.target !== pendingBtn &&
            !pendingBtn.contains(e.target)
          ) {
            closeDropdown();
          }
        });

        // 초기 상태
        closeDropdown();
      })();
    </script>

    <!-- React Auto Correcting Component -->
    <script type="text/babel">
      const { useState, useEffect } = React;

      function RunExecutionIndicator() {
        const [isVisible, setIsVisible] = useState(false);
        const [message, setMessage] = useState("Executing...");

        useEffect(() => {
          const handleMessage = (event) => {

            if (
              data.command === "updateProcessingStatus" &&
              data.step === "error_correction"

              if (
                data.status.includes("자동 오류 수정") ||
                data.status.includes("오류 수정") ||
                data.status.includes("터미널 오류 감지")

                setIsVisible(true);
                setMessage("Auto Correcting...");
              } else if (
                data.status.includes("완료") ||
                data.status.includes("실패") ||
                data.status.includes("수정 완료") ||

              data.command === "showErrorCorrectionFailure"

      // Typing Animation Hook
      function useTypingAnimation(text, speed = 50) {
        const [displayedText, setDisplayedText] = useState("");
        const [isTyping, setIsTyping] = useState(false);

        useEffect(() => {
          if (!text) {
            setDisplayedText("");
            return;
          }

          setIsTyping(true);
          setDisplayedText("");

          let index = 0;
          const timer = setInterval(() => {
            if (index < text.length) {
              setDisplayedText(text.slice(0, index + 1));
              index++;
            } else {
              setIsTyping(false);
              clearInterval(timer);
            }
          }, speed);

          return () => clearInterval(timer);
        }, [text, speed]);

        return { displayedText, isTyping };
      }

              ),

      // TaskQueue Component - 작업 큐 표시
      function TaskQueue() {
        const [tasks, setTasks] = useState([]);
        const [isVisible, setIsVisible] = useState(false);
        const [isMinimized, setIsMinimized] = useState(false);

        useEffect(() => {
          const handleMessage = (event) => {
            const data = event.data;
            if (data.command === "updateTaskQueue") {
              setTasks(data.tasks || []);
              if (data.clear) {
                setIsVisible(false);
                setIsMinimized(false);
              } else if (data.tasks && data.tasks.length > 0) {
                setIsVisible(true);
              } else {
                setIsVisible(false);
              }
            }
          };

          window.addEventListener("message", handleMessage);
          return () => window.removeEventListener("message", handleMessage);
        }, []);

        if (!isVisible || tasks.length === 0) return null;

        return React.createElement(
          "div",
          {
            className: `task-queue-popup ${isMinimized ? "minimized" : ""}`,
          },
          [
            React.createElement(
              "div",
              {
                key: "header",
                className: "task-queue-header",
                onClick: () => setIsMinimized(!isMinimized),
              },
              [
                React.createElement(
                  "span",
                  { key: "title" },
                  `Todos (${tasks.filter((t) => t.status === "done" || t.status === "warning").length}/${tasks.length})`,
                ),
                React.createElement(
                  "div",
                  {
                    key: "actions",
                    className: "task-queue-header-actions",
                  },
                  [
                    React.createElement(
                      "button",
                      {
                        key: "minimize",
                        onClick: (e) => {
                          e.stopPropagation();
                          setIsMinimized(!isMinimized);
                        },
                        style: {
                          background: "none",
                          border: "none",
                          color: "var(--vscode-foreground)",
                          cursor: "pointer",
                          fontSize: "14px",
                          padding: "0 4px",
                        },
                        title: isMinimized ? "최대화" : "최소화",
                      },
                      isMinimized ? "□" : "_",
                    ),
                    React.createElement(
                      "button",
                      {
                        key: "close",
                        onClick: (e) => {
                          e.stopPropagation();
                          setIsVisible(false);
                        },
                        style: {
                          background: "none",
                          border: "none",
                          color: "var(--vscode-foreground)",
                          cursor: "pointer",
                          fontSize: "16px",
                          padding: "0 4px",
                        },
                        title: "닫기",
                      },
                      "×",
                    ),
                  ],
                ),
              ],
            ),
            React.createElement(
              "div",
              {
                key: "content",
                className: "task-queue-content",
              },
              tasks.map((task, index) => {
                const isDone = task.status === "done";
                const isWorking = task.status === "in_progress";
                const isFailed = task.status === "failed";
                const isWarning = task.status === "warning";

                let statusClass = "pending";
                if (isDone) statusClass = "done";
                else if (isWarning) statusClass = "warning";
                else if (isWorking) statusClass = "working";
                else if (isFailed) statusClass = "failed";

                return React.createElement(
                  "div",
                  {
                    key: task.id || index,
                    className: `task-item ${isDone ? "done" : ""} ${isWorking ? "working" : ""} ${isFailed ? "failed" : ""} ${isWarning ? "warning" : ""}`,
                  },
                  [
                    React.createElement(
                      "div",
                      {
                        key: "icon",
                        className: "task-status-icon",

                      React.createElement("span", {
                        className: `status-circle ${statusClass}`,

                    ),
                    React.createElement(
                      "div",
                      {
                        key: "info",
                        className: "task-info",
                      },
                      [
                        React.createElement(
                          "div",
                          {
                            key: "title",

          ],

          const handleMessage = (event) => {
            const data = event.data;
            if (data.command === "clearHistory") {
              setMessages([]);
            } else if (data.command === "showCalloutExecuting") {
              // 모든 callout 박스에 executing 상태 표시
              showAllCalloutExecuting();
            } else if (data.command === "hideCalloutExecuting") {
              // 모든 callout 박스의 executing 상태 숨김

            }
          };

          window.addEventListener("message", handleMessage);
          return () => {
            window.removeEventListener("message", handleMessage);
          };

        return React.createElement(

            style: { position: "relative", width: "100%", height: "100%" },

          [
            React.createElement(RunExecutionIndicator, {

            React.createElement(TaskQueue, { key: "task-queue" }),
          ],

        root.render(React.createElement(ReactApp));

      // 메시지 수신 처리
      window.addEventListener("message", function (event) {
        const data = event.data;
        if (data.command === "showErrorCorrection") {
          // 오류 수정 정보를 ProcessingSteps에 표시
          const errorCorrectionStatus = `🔧 오류 수정 시도 ${data.retryCount}/3: ${data.originalCommand} → ${data.correctedCommand}`;
          // updateProcessingStatus('error_correction', errorCorrectionStatus);
        }
      });

      // 모든 callout 박스에 executing 상태를 표시하는 함수
      function showAllCalloutExecuting() {
        const codeBlocks = document.querySelectorAll("pre code");
        codeBlocks.forEach((codeElement) => {
          const calloutBox =
            codeElement.closest("pre") || codeElement.closest(".code-block");
          if (
            calloutBox &&
            !calloutBox.querySelector(".callout-executing-indicator")
          ) {
            const executingIndicator = document.createElement("div");
            executingIndicator.className = "callout-executing-indicator";
            executingIndicator.innerHTML = `
                        <div class="callout-executing-content">
                            <div class="callout-executing-spinner"></div>
                            <span class="callout-executing-text">Executing...</span>
                        </div>
                    `;

            calloutBox.style.position = "relative";
            calloutBox.appendChild(executingIndicator);
          }
        });
      }

      // 모든 callout 박스의 executing 상태를 숨기는 함수
      function hideAllCalloutExecuting() {
        const executingIndicators = document.querySelectorAll(
          ".callout-executing-indicator",
        );
        executingIndicators.forEach((indicator) => {
          if (indicator.parentNode) {
            indicator.parentNode.removeChild(indicator);
          }
        });
      }
    </script>
